<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Companies</h1>
      <p class="page-subtitle">Every company you've studied for or applied to.</p>
    </div>
    <button class="btn-primary">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add company
    </button>
  </div>

  <div class="companies-grid">
    @for (company of store.companies(); track company.id) {
      <div class="card company-card">
        <div class="company-top">
          <div class="company-avatar"
               [style.background]="avatarBg(company.name)"
               [style.color]="avatarColor(company.name)">{{ initial(company.name) }}</div>
          <div class="company-info">
            <span class="company-name">{{ company.name }}</span>
            <span class="company-category">@ {{ company.category }}</span>
          </div>
          <span class="badge" [class]="statusClass(company.status)">{{ statusLabel(company.status) }}</span>
        </div>
        <div class="company-stats">
          <div class="stat">
            <span class="stat-num">—</span>
            <span class="stat-label">Linked subjects</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-num">—</span>
            <span class="stat-label">Applications</span>
          </div>
        </div>
      </div>
    }
  </div>
</div>
